server {
	listen 1.1.1.1:109;
	listen 1.1.1.1:309;
	upload_dir '/data/hey';
	autoindex on;
	autoindex off;
	allowed_methods GET POST DELETE;
}

server {
	listen 1.1.1.1:203;
	index hey.html but.lkasjdf;
	server_name 'but' 'whoami' 'localhost';
	max_client_body_size 20;
	location / {
		root /data/www;
		index file.html;
	}
}

server {
	listen 1.1.1.1:306;
	server_name 'hey';
}

